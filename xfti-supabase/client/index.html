      .container {

      }

      /* 卡片通用样式 */
      .card {
        background: white;
        border-radius: 32px;
        padding: 32px 24px;

      /* 首页样式 */

        font-weight: 800;
        text-align: center;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

        background-clip: text;
        color: transparent;
        margin-bottom: 16px;
      }

      .subtitle {
        text-align: center;
        color: #666;
        margin-bottom: 32px;
        font-size: 18px;
      }

      .btn {
        display: block;
        width: 100%;
        padding: 16px;
        border: none;
        border-radius: 48px;
        font-size: 18px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        text-align: center;
      }

      .btn-primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
      }

      .btn-primary:hover {
        transform: scale(0.98);
        opacity: 0.9;
      }

      .btn-outline {
        background: white;
        border: 2px solid #667eea;
        color: #667eea;
      }

      /* 测试页样式 */
      .progress {
        background: #e0e0e0;
        border-radius: 20px;
        height: 8px;
        margin-bottom: 24px;
        overflow: hidden;
      }

      .progress-bar {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        height: 100%;
        border-radius: 20px;
        transition: width 0.3s ease;
      }

      .question-text {
        font-size: 22px;
        font-weight: 600;
        margin-bottom: 32px;
        line-height: 1.4;
      }

      .option {
        background: #f5f5f5;
        padding: 16px;
        border-radius: 20px;
        margin-bottom: 12px;
        cursor: pointer;
        transition: all 0.2s;
        border: 2px solid transparent;
      }

      .option:hover {
        background: #eeeeee;
      }

      .option.selected {
        background: #e8e0ff;
        border-color: #667eea;
      }

      .nav-buttons {
        display: flex;
        gap: 12px;
        margin-top: 24px;
      }

      .result-type {
        font-size: 36px;
        font-weight: 800;
        text-align: center;
        color: #667eea;
        margin-bottom: 16px;
      }

      .result-desc {
        font-size: 16px;
        line-height: 1.6;
        color: #333;
        white-space: pre-wrap;
      }

      .restart-btn {
        margin-top: 24px;

      .hidden {
        display: none;
      }

      function saveProgress() {
        localStorage.setItem("xfti_answers", JSON.stringify(answers));
        localStorage.setItem("xfti_currentIndex", currentIndex);
      }

      // 辅助函数：加载进度
      function loadProgress() {
        const savedAnswers = localStorage.getItem("xfti_answers");
        const savedIndex = localStorage.getItem("xfti_currentIndex");
        if (savedAnswers) {
          answers = JSON.parse(savedAnswers);
        }
        if (savedIndex && parseInt(savedIndex) < questions.length) {
          currentIndex = parseInt(savedIndex);
        }
      }

      // 清除进度
      function clearProgress() {
        localStorage.removeItem("xfti_answers");
        localStorage.removeItem("xfti_currentIndex");
        answers = new Array(questions.length).fill(null);
        currentIndex = 0;
      }

      // 渲染当前题目
      function renderQuestion() {
        const q = questions[currentIndex];
        questionText.textContent = `${currentIndex + 1}. ${q.text}`;

        // 生成选项
        let optionsHtml = "";
        q.options.forEach((opt, idx) => {
          const isSelected = answers[currentIndex] === opt.value;
          const selectedClass = isSelected ? "selected" : "";
          optionsHtml += `
                    <div class="option ${selectedClass}" data-value="${opt.value}">
                        ${String.fromCharCode(65 + idx)}. ${opt.label}
                    </div>
                `;
        });
        optionsContainer.innerHTML = optionsHtml;

        // 绑定选项点击事件
        document.querySelectorAll(".option").forEach((optDiv) => {
          optDiv.addEventListener("click", (e) => {
            const value = parseInt(optDiv.dataset.value);
            answers[currentIndex] = value;
            saveProgress();
            renderQuestion(); // 重新渲染以更新选中样式
          });
        });

        // 更新进度条
        const progressPercent = ((currentIndex + 1) / questions.length) * 100;
        progressBar.style.width = `${progressPercent}%`;

        // 上一题/下一题按钮状态
        prevBtn.disabled = currentIndex === 0;
        prevBtn.style.opacity = currentIndex === 0 ? "0.5" : "1";
      }

      // 计算总分并显示结果
      function showResult() {
        // 检查是否所有题目都答完了
        if (answers.some((a) => a === null)) {
          alert("请先完成所有题目！");
          return false;
        }

        const totalScore = answers.reduce((sum, val) => sum + val, 0);
        // 根据总分找到对应的结果
        let result = results.find(
          (r) => totalScore >= r.min && totalScore <= r.max,
        );
        if (!result) result = results[0]; // fallback

        // 显示结果页
        document.getElementById("resultType").textContent = result.type;
        document.getElementById("resultDesc").textContent = result.desc;

        homePage.classList.add("hidden");
        testPage.classList.add("hidden");
        resultPage.classList.remove("hidden");

        // 可选：清除进度（测试完成后）
        // clearProgress();
        return true;
      }

      // 重新开始
      function restart() {
        clearProgress();
        homePage.classList.remove("hidden");
        testPage.classList.add("hidden");
        resultPage.classList.add("hidden");
        currentIndex = 0;
        answers = new Array(questions.length).fill(null);
      }

      // 事件绑定
      startBtn.addEventListener("click", () => {
        loadProgress(); // 加载之前的进度
        // 如果有未完成的测试，继续
        homePage.classList.add("hidden");
        testPage.classList.remove("hidden");
        renderQuestion();
      });

      prevBtn.addEventListener("click", () => {
        if (currentIndex > 0) {
          currentIndex--;
          renderQuestion();
          saveProgress();
        }
      });

      nextBtn.addEventListener("click", () => {
        if (answers[currentIndex] === null) {
          alert("请先选择答案");
          return;
        }
        if (currentIndex === questions.length - 1) {
          // 最后一题，显示结果
          showResult();
        } else {
          currentIndex++;
          renderQuestion();
          saveProgress();
        }
      });

      restartBtn.addEventListener("click", () => {
        restart();
      });

      // 初始加载时检查是否有未完成测试
      window.addEventListener("load", () => {
        loadProgress();
        const hasProgress = answers.some((a) => a !== null);
        if (hasProgress && confirm("检测到未完成的测试，是否继续？")) {
          startBtn.click();
        }
      });
    </script>
  </body>
</html>
