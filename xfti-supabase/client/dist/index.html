<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>XFTI 消费人格测试</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          "Helvetica Neue",
          sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
      }

      .container {
        max-width: 600px;
        margin: 0 auto;
      }

      /* 卡片通用样式 */
      .card {
        background: white;
        border-radius: 32px;
        padding: 32px 24px;
        box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.2);
        margin-bottom: 20px;
      }

      /* 首页样式 */
      .title {
        font-size: 48px;
        font-weight: 800;
        text-align: center;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        margin-bottom: 16px;
      }

      .subtitle {
        text-align: center;
        color: #666;
        margin-bottom: 32px;
        font-size: 18px;
      }

      .btn {
        display: block;
        width: 100%;
        padding: 16px;
        border: none;
        border-radius: 48px;
        font-size: 18px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        text-align: center;
      }

      .btn-primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
      }

      .btn-primary:hover {
        transform: scale(0.98);
        opacity: 0.9;
      }

      .btn-outline {
        background: white;
        border: 2px solid #667eea;
        color: #667eea;
      }

      /* 测试页样式 */
      .progress {
        background: #e0e0e0;
        border-radius: 20px;
        height: 8px;
        margin-bottom: 24px;
        overflow: hidden;
      }

      .progress-bar {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        height: 100%;
        border-radius: 20px;
        transition: width 0.3s ease;
      }

      .question-text {
        font-size: 22px;
        font-weight: 600;
        margin-bottom: 32px;
        line-height: 1.4;
      }

      .option {
        background: #f5f5f5;
        padding: 16px;
        border-radius: 20px;
        margin-bottom: 12px;
        cursor: pointer;
        transition: all 0.2s;
        border: 2px solid transparent;
      }

      .option:hover {
        background: #eeeeee;
      }

      .option.selected {
        background: #e8e0ff;
        border-color: #667eea;
      }

      .nav-buttons {
        display: flex;
        gap: 12px;
        margin-top: 24px;
      }

      /* 结果页样式 */
      .result-type {
        font-size: 36px;
        font-weight: 800;
        text-align: center;
        color: #667eea;
        margin-bottom: 16px;
      }

      .result-desc {
        font-size: 16px;
        line-height: 1.6;
        color: #333;
        white-space: pre-wrap;
      }

      .restart-btn {
        margin-top: 24px;
        border-radius: 30px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 12px 24px;
      }

      .dimension-panel {
        margin-top: 18px;
        padding: 14px;
        border-radius: 16px;
        background: #f7f8ff;
      }

      .dimension-panel-title {
        font-size: 24px;
        font-weight: 700;
        color: #4c4383;
        margin-bottom: 16px;
      }

      .chart-switcher {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin-bottom: 10px;
      }

      .chart-btn {
        border: 1px solid #dcd7ff;
        background: white;
        color: #534894;
        border-radius: 999px;
        padding: 7px 10px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
      }

      .chart-btn.active {
        border-color: transparent;
        color: white;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      }

      .dimension-list {
        display: grid;
        gap: 24px;
      }

      .dimension-card {
        background: white;
        border-radius: 12px;
        border: 1px solid #eceaff;
        padding: 10px;
        cursor: pointer;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease,
          border-color 0.2s ease;
      }

      .dimension-card:hover {
        transform: scale(1.02);
        box-shadow: 0 8px 16px rgba(84, 68, 154, 0.08);
      }

      .dimension-card.active {
        border-color: #8d7fd4;
        box-shadow: 0 0 0 2px #e5e0ff;
      }

      .dimension-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 13px;
      }

      .dimension-name {
        color: #353049;
        font-size: 18px;
        font-weight: 700;
      }

      .dimension-score {
        color: #5d52a8;
        font-size: 28px;
        font-weight: 700;
        line-height: 1;
      }

      .dimension-bar {
        height: 8px;
        background: #efedff;
        border-radius: 999px;
        margin-top: 8px;
        overflow: hidden;
      }

      .dimension-fill {
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      }

      .dimension-meta {
        margin-top: 12px;
        font-size: 14px;
        font-weight: 400;
        color: #6d6497;
      }

      .ring-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .ring-card {
        background: white;
        border: 1px solid #eceaff;
        border-radius: 12px;
        padding: 10px;
        display: grid;
        place-items: center;
        gap: 6px;
        cursor: pointer;
      }

      .ring-card.active {
        border-color: #8d7fd4;
        box-shadow: 0 0 0 2px #e5e0ff;
      }

      .ring-name {
        font-size: 12px;
        font-weight: 600;
        color: #433b74;
      }

      .ring-score {
        font-size: 12px;
        color: #6b6197;
      }

      .radar-wrap {
        background: white;
        border: 1px solid #eceaff;
        border-radius: 12px;
        padding: 8px;
      }

      .radar-legend {
        margin-top: 8px;
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .radar-chip {
        border: 1px solid #d9d4fa;
        background: #f8f7ff;
        border-radius: 999px;
        padding: 4px 8px;
        font-size: 11px;
        color: #5a4f98;
        cursor: pointer;
      }

      .radar-chip.active {
        color: white;
        border-color: transparent;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      }

      .dimension-tooltip {
        position: fixed;
        z-index: 40;
        pointer-events: none;
        min-width: 180px;
        max-width: 260px;
        padding: 8px 10px;
        border-radius: 10px;
        font-size: 12px;
        line-height: 1.4;
        color: white;
        background: rgba(48, 39, 90, 0.94);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.18);
      }

      .modal-overlay {
        position: fixed;
        inset: 0;
        z-index: 50;
        background: rgba(0, 0, 0, 0.45);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease;
      }

      .modal-overlay.open {
        opacity: 1;
        pointer-events: auto;
      }

      .modal-card {
        width: 90%;
        max-width: 400px;
        border-radius: 24px;
        padding: 18px 16px;
        background: rgba(255, 255, 255, 0.9);
        border: 1px solid #eceaff;
        box-shadow: 0 16px 30px rgba(43, 35, 83, 0.2);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        transform: scale(0.95);
        opacity: 0;
        transition:
          transform 0.24s ease,
          opacity 0.24s ease;
      }

      .modal-overlay.open .modal-card {
        transform: scale(1);
        opacity: 1;
      }

      .modal-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .modal-title {
        color: #3f3772;
        font-size: 18px;
        font-weight: 700;
      }

      .modal-close {
        width: 32px;
        height: 32px;
        border-radius: 999px;
        border: 1px solid #d8d2ff;
        background: white;
        color: #4f4595;
        font-size: 18px;
        line-height: 1;
        cursor: pointer;
      }

      .modal-score {
        margin-top: 12px;
        color: #5c53a7;
        font-size: 40px;
        font-weight: 800;
        line-height: 1;
      }

      .modal-score-unit {
        font-size: 18px;
        font-weight: 600;
      }

      .modal-copy {
        margin-top: 10px;
        color: #554e78;
        font-size: 14px;
        line-height: 1.7;
      }

      .modal-tip {
        margin-top: 10px;
        border-radius: 12px;
        background: #f5f3ff;
        padding: 10px;
        color: #4f4595;
        font-size: 13px;
      }

      .modal-ok {
        margin-top: 14px;
        background: #f5f5f5;
        border: 1px solid #d0d0d0;
        color: #333;
      }

      .modal-ok:hover {
        opacity: 0.95;
      }

      .share-hint {
        margin-top: 18px;
        padding: 14px;
        border-radius: 14px;
        background: #f2f3f5;
        border: 1px solid #e1e3e8;
        color: #4a4f5e;
        text-align: center;
      }

      .share-hint-tag {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 6px;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
        color: white;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      }

      .share-hint-text {
        font-size: 14px;
        line-height: 1.5;
      }

      .share-hint-sub {
        margin-top: 4px;
        font-size: 12px;
        color: #6b6197;
      }

      @keyframes shareHintPulse {
        0% {
          box-shadow: 0 0 0 0 rgba(102, 126, 234, 0.24);
        }

        70% {
          box-shadow: 0 0 0 10px rgba(102, 126, 234, 0);
        }

        100% {
          box-shadow: 0 0 0 0 rgba(102, 126, 234, 0);
        }
      }

      /* 辅助类 */
      .hidden {
        display: none;
      }

      .text-center {
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="container" id="app">
      <!-- 首页 -->
      <div id="homePage" class="card">
        <div class="title">XFTI</div>
        <div class="subtitle">钱辈，请和我交往吧！</div>
        <div
          class="text-center"
          style="margin-bottom: 32px; color: #888; font-size: 14px"
        >
          18题 · 测测你的消费人格
        </div>
        <button class="btn btn-primary" id="startBtn">开始测试</button>
      </div>

      <!-- 测试页 -->
      <div id="testPage" class="card hidden">
        <div class="progress">
          <div class="progress-bar" id="progressBar" style="width: 0%"></div>
        </div>
        <div class="question-text" id="questionText"></div>
        <div id="optionsContainer"></div>
        <div class="nav-buttons">
          <button class="btn btn-outline" id="prevBtn" style="flex: 1">
            上一题
          </button>
          <button class="btn btn-primary" id="nextBtn" style="flex: 2">
            下一题
          </button>
        </div>
      </div>

      <!-- 结果页 -->
      <div id="resultPage" class="card hidden">
        <div class="result-type" id="resultType"></div>
        <div class="result-desc" id="resultDesc"></div>
        <div class="dimension-panel">
          <div class="dimension-panel-title">你的消费画像</div>
          <div class="chart-switcher" id="chartSwitcher">
            <button class="chart-btn active" data-style="A">进度条</button>
            <button class="chart-btn" data-style="B">环形图</button>
            <button class="chart-btn" data-style="C">雷达图</button>
          </div>
          <div id="dimensionList" class="dimension-list"></div>
          <div id="dimensionTooltip" class="dimension-tooltip hidden"></div>
        </div>

        <div id="dimensionModal" class="modal-overlay" aria-hidden="true">
          <div class="modal-card" role="dialog" aria-modal="true">
            <div class="modal-head">
              <div class="modal-title" id="modalTitle"></div>
              <button class="modal-close" id="modalCloseBtn" aria-label="关闭">
                ×
              </button>
            </div>
            <div class="modal-score">
              <span id="modalScore"></span
              ><span class="modal-score-unit">%</span>
            </div>
            <div class="modal-copy" id="modalCopy"></div>
            <div class="modal-tip" id="modalTip"></div>
            <button class="btn modal-ok" id="modalOkBtn">
              知道了
            </button>
          </div>
        </div>

        <div class="share-hint">
          <div class="share-hint-tag">裂变推荐</div>
          <div class="share-hint-text">截图发朋友圈，看看朋友是什么人格？</div>
          <div class="share-hint-sub">手动截图即可分享，不需要授权登录</div>
        </div>
        <button class="btn btn-primary restart-btn" id="restartBtn">
          重新测试
        </button>
      </div>
    </div>

    <script>
      // ==================== 题库数据（根据你的文案整理）====================
      const questions = [
        {
          id: 1,
          text: "你在直播间看到'最后3件！限时5折！'，而这个东西你并不需要，你会？",
          options: [
            {
              value: 1,
              label:
                "直接划走，不看就不买，再点一个不感兴趣，今天他说只剩三件，明天再来他还是只剩三件，都是营销手段",
            },
            {
              value: 2,
              label:
                "犹豫一下，在直播间观望许久，实在是舍弃不了这个五折，但是又觉得这个东西并不实用，但最终没买",
            },
            {
              value: 3,
              label:
                "先加购，放在购物车里和自己深情对望，等主播喊'没了'就冲动下单",
            },
            { value: 4, label: "立马抢，有便宜不占王八蛋" },
          ],
        },
        {
          id: 2,
          text: "你妈说你买的一箱临期牛奶快过期了，你的反应是？",
          options: [
            {
              value: 1,
              label:
                "每天多喝两杯，绝不浪费，宁愿窜到坑里也不能倒进河里，自己丢东西的时候想想那些吃不起饭的非洲小孩!",
            },
            {
              value: 2,
              label: "做成酸奶或甜品消耗掉,既可以自己吃还可以送人卖一个人情",
            },
            {
              value: 3,
              label:
                "想到自己当初为了省几块钱买的临期，没想到最后还浪费了更多，后悔贪便宜，下次不买了",
            },
            {
              value: 4,
              label:
                "无所谓，过期就扔，再买新的，要不然不小心吃了过期食品伤害更大",
            },
          ],
        },
        {
          id: 3,
          text: "你报了一个健身班，花了2000元，但去了三次就不想去了，你会？",
          options: [
            { value: 1, label: "逼自己去，不能让钱白花，那可是两千块" },
            { value: 2, label: "尝试转让或退款，方法总比困难多" },
            { value: 3, label: "算了，就当买了教训，下次再也不办健身卡" },
            {
              value: 4,
              label: "不去就不去，开心就好，要不然累到了自己还得花钱再安慰自己",
            },
          ],
        },
        {
          id: 4,
          text: "你发现同一款手机，官方旗舰店卖5999，拼多多百亿补贴只要5199，但担心是后封机，你会？",
          options: [
            {
              value: 1,
              label:
                "多花800买个安心，去官方店，电子产品就不要追求性价比了，要不然花了钱又吃了亏",
            },
            {
              value: 2,
              label: "查大量测评，确认百亿补贴靠谱再买，多看看总没问题",
            },
            {
              value: 3,
              label:
                "买百亿补贴，赌一把运气，那可是八百块，而且那么多人都买了肯定没问题",
            },
            { value: 4, label: "哪个便宜买哪个，反正我也用不出来好坏" },
          ],
        },
        {
          id: 5,
          text: "深夜刷抖音，你看到一条知乎短文的解说视频，看到高潮部分没了后续，你心急如焚，但你发现想看原文要花9块9买会员。你会？",
          options: [
            {
              value: 1,
              label:
                "9块9也是钱，我在抖音、B站、小红书上到处搜，总能找到免费完整版",
            },
            {
              value: 2,
              label: "先收藏，等哪天实在没事干了再决定要不要花这个钱",
            },
            { value: 3, label: "犹豫一下，最后还是买了，毕竟就一杯奶茶钱" },
            {
              value: 4,
              label:
                "立刻付款！知识付费是对创作者的尊重，9块9买不了吃亏，而且日后还能继续用",
            },
          ],
        },
        {
          id: 6,
          text: "深夜，你在直播间刷到了一件超酷的衣服，远超你平常的购物标准，而且你并不需要这件衣服，但是那一瞬间你脑子里浮现了自己穿上这件衣服帅气的模样，那一刻你通常会？",
          options: [
            {
              value: 1,
              label:
                "根本不买，只买对的不买贵的，我连直播间都不看，绝不给自己后悔的机会",
            },
            {
              value: 2,
              label:
                "偶尔会冲动，在自己美好的幻想中激情下单，但大部分时候能忍住",
            },
            {
              value: 3,
              label:
                "经常买完就后悔，早上醒来火速申请退货，发誓以后再也不干这种事情",
            },
            {
              value: 4,
              label: "从来不退，买都买了，穿就是了，后悔那是以后的事",
            },
          ],
        },
        {
          id: 7,
          text: "你自己平时吃饭点外卖超过15块都要犹豫半天，但你喜欢的人（对象/暗恋的人）随口说了一句'好想要那个399的xx'，你会？",
          options: [
            { value: 1, label: "我自己都舍不得吃，凭什么给他花？" },
            {
              value: 2,
              label:
                "看情况，如果他对我也有差不多的付出，我可以考虑，反正有来有往也不算亏本呢",
            },
            {
              value: 3,
              label:
                "咬咬牙买了，大不了省点，对喜欢的人哪有不花钱的，看到他开心我就值了",
            },
            {
              value: 4,
              label:
                "毫不犹豫下单！故有周幽王烽火戏诸侯今有我千金博美人一笑，看到宝宝惊喜的崇拜我的样子一切都值得了",
            },
          ],
        },
        {
          id: 8,
          text: "你大学期间，平时舍不得吃舍不得喝，连奶茶都戒了，你攒钱是为了？",
          options: [
            {
              value: 1,
              label: "不为什么，就是喜欢看着银行卡余额增长，有安全感",
            },
            { value: 2, label: "为了毕业后的租房押金或者应急用" },
            {
              value: 3,
              label: "想在大学期间买一辆车（哪怕是二手），出行方便又拉风",
            },
            { value: 4, label: "买最新款iPhone、看演唱会或者旅游，享受当下" },
          ],
        },
        {
          id: 9,
          text: "你追一部小说或者电视剧，发现正版平台要充会员，网上到处都是盗版资源，你会？",
          options: [
            {
              value: 1,
              label:
                "坚决看盗版，能省一分是一分，版权费又不进我口袋，澳门新葡京我来了",
            },
            {
              value: 2,
              label:
                "先找盗版，如果实在找不到或者画质太差，再考虑充会员，看看有没有什么学生优惠或者pdd下单更便宜，实在不行和人拼一个呗",
            },
            { value: 3, label: "看几集盗版觉得不错，就去补个正版会员支持一下" },
            { value: 4, label: "绝对看正版，我懒得到处去找盗版" },
          ],
        },
        {

      function calculateDimensionScores(answerList) {
        const rawScores = {};
        const questionCount = {};

        Object.keys(dimensionModel).forEach((key) => {
          rawScores[key] = 0;
          questionCount[key] = 0;
        });

        answerList.forEach((answer, index) => {
          const qid = index + 1;
          const mapping = dimensionQuestionMap[qid];
          if (!mapping || answer === null) return;

          const weight = mapping.weights[answer - 1] ?? 0;
          rawScores[mapping.dimension] += weight;
          questionCount[mapping.dimension] += 1;
        });

        return Object.entries(dimensionModel).map(([key, meta]) => {
          const minScore = -2 * questionCount[key];
          const maxScore = 2 * questionCount[key];
          const normalized =
            maxScore === minScore
              ? 50
              : Math.round(
                  ((rawScores[key] - minScore) / (maxScore - minScore)) * 100,
                );

          return {
            key,
            name: meta.name,
            normalized,
            level: getDimensionLevel(normalized),
            trait: normalized >= 50 ? meta.highTrait : meta.lowTrait,
          };
        });
      }

                  <circle cx="45" cy="45" r="28" stroke="#667eea" stroke-width="8" fill="none" stroke-linecap="round"
                    stroke-dasharray="${circumference.toFixed(2)}"
                    stroke-dashoffset="${(circumference - progress).toFixed(2)}"
                    transform="rotate(-90 45 45)">
                  </circle>
                  <text x="45" y="50" text-anchor="middle" font-size="14" font-weight="700" fill="#4f4595">${item.normalized}</text>
                </svg>
                <div class="ring-name">${item.name}</div>
                <div class="ring-score">${item.level}倾向</div>
              </div>
            `;
          })
          .join("");
      }

      function getRadarPoint(cx, cy, radius, angle, value) {
        const r = radius * (value / 100);
        return {
          x: cx + r * Math.cos(angle),
          y: cy + r * Math.sin(angle),
        };
      }

      function renderRadar(scoreList) {
        const width = 330;
        const height = 300;
        const cx = width / 2;
        const cy = 140;
        const radius = 95;
        const levels = [20, 40, 60, 80, 100];
        const count = scoreList.length;
        const angleStep = (Math.PI * 2) / count;

        const levelPolygons = levels
          .map((lv) => {
            const pts = scoreList
              .map((_, idx) => {
                const angle = -Math.PI / 2 + idx * angleStep;
                const p = getRadarPoint(cx, cy, radius, angle, lv);
                return `${p.x.toFixed(1)},${p.y.toFixed(1)}`;
              })
              .join(" ");
            return `<polygon points="${pts}" fill="none" stroke="#e7e3ff" stroke-width="1"></polygon>`;
          })
          .join("");

        const spokes = scoreList
          .map((_, idx) => {
            const angle = -Math.PI / 2 + idx * angleStep;
            const p = getRadarPoint(cx, cy, radius, angle, 100);
            return `<line x1="${cx}" y1="${cy}" x2="${p.x.toFixed(1)}" y2="${p.y.toFixed(1)}" stroke="#ece9ff" stroke-width="1"></line>`;
          })
          .join("");

        const dataPoints = scoreList.map((item, idx) => {
          const angle = -Math.PI / 2 + idx * angleStep;
          const p = getRadarPoint(cx, cy, radius, angle, item.normalized);
          return {
            ...item,
            x: p.x,
            y: p.y,
          };
        });

        const dataPolygon = dataPoints
          .map((p) => `${p.x.toFixed(1)},${p.y.toFixed(1)}`)
          .join(" ");

        const labels = scoreList
          .map((item, idx) => {
            const angle = -Math.PI / 2 + idx * angleStep;
            const p = getRadarPoint(cx, cy, radius + 22, angle, 100);
            return `<text x="${p.x.toFixed(1)}" y="${p.y.toFixed(1)}" text-anchor="middle" font-size="11" fill="#5d52a8">${item.key}</text>`;
          })
          .join("");

        const pointNodes = dataPoints
          .map(
            (p) =>
              `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="${p.key === activeDimensionKey ? 6 : 4}" fill="#5f72d9" stroke="white" stroke-width="2" data-dimension-key="${p.key}"></circle>`,
          )
          .join("");

        const chips = scoreList
          .map(
            (item) =>
              `<button class="radar-chip ${item.key === activeDimensionKey ? "active" : ""}" data-dimension-key="${item.key}">${item.name} ${item.normalized}</button>`,
          )
          .join("");

        dimensionList.className = "";
        dimensionList.innerHTML = `
          <div class="radar-wrap">
            <svg width="100%" viewBox="0 0 ${width} ${height}" role="img" aria-label="维度雷达图">
              ${levelPolygons}
              ${spokes}
              <polygon points="${dataPolygon}" fill="rgba(102,126,234,0.25)" stroke="#667eea" stroke-width="2"></polygon>
              ${pointNodes}
              ${labels}
            </svg>
            <div class="radar-legend">${chips}</div>
          </div>
        `;
      }

      function renderDimensionScores(scoreList) {
        if (!scoreList || scoreList.length === 0) return;
        currentDimensionScores = scoreList;
        if (!activeDimensionKey) {
          const top = [...scoreList].sort(
            (a, b) => b.normalized - a.normalized,
          )[0];
          activeDimensionKey = top.key;
        }

        if (currentChartStyle === "A") {
          renderBars(scoreList);
        } else if (currentChartStyle === "B") {
          renderRings(scoreList);
        } else {
          renderRadar(scoreList);
        }
      }

      function switchChartStyle(style) {
        currentChartStyle = style;
        chartSwitcher.querySelectorAll(".chart-btn").forEach((btn) => {
          btn.classList.toggle("active", btn.dataset.style === style);
        });
        renderDimensionScores(currentDimensionScores);
      }

      // 辅助函数：保存到 localStorage
      function saveProgress() {
        localStorage.setItem("xfti_answers", JSON.stringify(answers));
        localStorage.setItem("xfti_currentIndex", currentIndex);
      }

      // 辅助函数：加载进度
      function loadProgress() {
        const savedAnswers = localStorage.getItem("xfti_answers");
        const savedIndex = localStorage.getItem("xfti_currentIndex");
        if (savedAnswers) {
          try {
            const parsed = JSON.parse(savedAnswers);
            answers = new Array(questions.length).fill(null);
            if (Array.isArray(parsed)) {
              parsed.slice(0, questions.length).forEach((val, idx) => {
                if ([1, 2, 3, 4].includes(val)) {
                  answers[idx] = val;
                }
              });
            }
          } catch (_error) {
            answers = new Array(questions.length).fill(null);
          }
        }
        if (savedIndex && parseInt(savedIndex) < questions.length) {
          currentIndex = parseInt(savedIndex);
        }
      }

      // 清除进度
      function clearProgress() {
        localStorage.removeItem("xfti_answers");
        localStorage.removeItem("xfti_currentIndex");
        answers = new Array(questions.length).fill(null);
        currentIndex = 0;
      }

      // 渲染当前题目
      function renderQuestion() {
        const q = questions[currentIndex];
        questionText.textContent = `${currentIndex + 1}. ${q.text}`;

        // 生成选项
        let optionsHtml = "";
        q.options.forEach((opt, idx) => {
          const isSelected = answers[currentIndex] === opt.value;
          const selectedClass = isSelected ? "selected" : "";
          optionsHtml += `
                    <div class="option ${selectedClass}" data-value="${opt.value}">
                        ${String.fromCharCode(65 + idx)}. ${opt.label}
                    </div>
                `;
        });
        optionsContainer.innerHTML = optionsHtml;

        // 绑定选项点击事件
        document.querySelectorAll(".option").forEach((optDiv) => {
          optDiv.addEventListener("click", (e) => {
            const value = parseInt(optDiv.dataset.value);
            answers[currentIndex] = value;
            saveProgress();
            renderQuestion(); // 重新渲染以更新选中样式
          });
        });

        // 更新进度条
        const progressPercent = ((currentIndex + 1) / questions.length) * 100;
        progressBar.style.width = `${progressPercent}%`;

        // 上一题/下一题按钮状态
        prevBtn.disabled = currentIndex === 0;
        prevBtn.style.opacity = currentIndex === 0 ? "0.5" : "1";
      }

      // 计算总分并显示结果
      function showResult() {
        // 检查是否所有题目都答完了
        if (answers.some((a) => a === null)) {
          alert("请先完成所有题目！");
          return false;
        }

        const totalScore = answers.reduce((sum, val) => sum + val, 0);
        // 根据总分找到对应的结果
        let result = results.find(
          (r) => totalScore >= r.min && totalScore <= r.max,
        );
        if (!result) result = results[0]; // fallback

        // 显示结果页
        document.getElementById("resultType").textContent = result.type;
        document.getElementById("resultDesc").textContent = result.desc;
        const dimensionScores = calculateDimensionScores(answers);
        renderDimensionScores(dimensionScores);

        homePage.classList.add("hidden");
        testPage.classList.add("hidden");
        resultPage.classList.remove("hidden");

        // 可选：清除进度（测试完成后）
        // clearProgress();
        return true;
      }

      // 重新开始
      function restart() {
        clearProgress();
        closeDimensionModal();
        homePage.classList.remove("hidden");
        testPage.classList.add("hidden");
        resultPage.classList.add("hidden");
        currentIndex = 0;
        answers = new Array(questions.length).fill(null);
      }

      // 事件绑定
      startBtn.addEventListener("click", () => {
        loadProgress(); // 加载之前的进度
        // 如果有未完成的测试，继续
        homePage.classList.add("hidden");
        testPage.classList.remove("hidden");
        renderQuestion();
      });

      prevBtn.addEventListener("click", () => {
        if (currentIndex > 0) {
          currentIndex--;
          renderQuestion();
          saveProgress();
        }
      });

      nextBtn.addEventListener("click", () => {
        if (answers[currentIndex] === null) {
          alert("请先选择答案");
          return;
        }
        if (currentIndex === questions.length - 1) {
          // 最后一题，显示结果
          showResult();
        } else {
          currentIndex++;
          renderQuestion();
          saveProgress();
        }
      });

      restartBtn.addEventListener("click", () => {
        restart();
      });

      chartSwitcher.addEventListener("click", (event) => {
        const btn = event.target.closest(".chart-btn");
        if (!btn) return;
        switchChartStyle(btn.dataset.style);
      });

      dimensionList.addEventListener("click", (event) => {
        const trigger = event.target.closest("[data-dimension-key]");
        if (!trigger) return;
        activeDimensionKey = trigger.dataset.dimensionKey;
        renderDimensionScores(currentDimensionScores);
        const selected = getDimensionByKey(
          currentDimensionScores,
          activeDimensionKey,
        );
        openDimensionModal(selected);
      });

      modalCloseBtn.addEventListener("click", closeDimensionModal);
      modalOkBtn.addEventListener("click", closeDimensionModal);

      dimensionModal.addEventListener("click", (event) => {
        if (event.target === dimensionModal) {
          closeDimensionModal();
        }
      });

      document.addEventListener("keydown", (event) => {
        if (
          event.key === "Escape" &&
          dimensionModal.classList.contains("open")
        ) {
          closeDimensionModal();
        }
      });

      dimensionList.addEventListener("mouseover", (event) => {
        const trigger = event.target.closest("[data-dimension-key]");
        if (!trigger) return;
        const item = getDimensionByKey(
          currentDimensionScores,
          trigger.dataset.dimensionKey,
        );
        if (!item) return;
        showTooltip(event, item);
      });

      dimensionList.addEventListener("mousemove", (event) => {
        if (!dimensionTooltip.classList.contains("hidden")) {
          moveTooltip(event);
        }
      });

      dimensionList.addEventListener("mouseout", (event) => {
        const related = event.relatedTarget;
        if (
          related &&
          related.closest &&
          related.closest("[data-dimension-key]")
        ) {
          return;
        }
        hideTooltip();
      });

      // 初始加载时检查是否有未完成测试
      window.addEventListener("load", () => {
        loadProgress();
        const hasProgress = answers.some((a) => a !== null);
        if (hasProgress && confirm("检测到未完成的测试，是否继续？")) {
          startBtn.click();
        }
      });
    </script>
  </body>
</html>
